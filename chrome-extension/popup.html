<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScreenStudio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f12;
      color: #fff;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap-8px;
      margin-bottom: 16px;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 14px; height: 14px; fill: white; }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-left: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.idle    { background: rgba(255,255,255,0.2); }
    .dot.recording { background: #ef4444; animation: pulse 1.2s ease-in-out infinite; }
    .dot.paused  { background: #f59e0b; }
    .dot.offline { background: rgba(255,255,255,0.1); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      flex: 1;
    }

    .duration {
      font-size: 11px;
      font-family: monospace;
      color: rgba(255,255,255,0.35);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-record {
      background: #ef4444;
      color: white;
    }

    .btn-record:hover:not(:disabled) { background: #f87171; }

    .btn-stop {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    .btn-stop:hover:not(:disabled) { background: rgba(255,255,255,0.15); }

    .offline-notice {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      padding: 4px 0;
    }

    .dot-icon {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .sq-icon {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5"/></svg>
    </div>
    <span class="title">ScreenStudio</span>
  </div>

  <div class="status-row">
    <div class="dot idle" id="dot"></div>
    <span class="status-text" id="statusText">Connecting…</span>
    <span class="duration" id="durationText"></span>
  </div>

  <button class="btn btn-record" id="startBtn" disabled>
    <span class="dot-icon"></span>
    Start Recording
  </button>
  <div style="height:8px"></div>
  <button class="btn btn-stop" id="stopBtn" disabled style="display:none">
    <span class="sq-icon"></span>
    Stop &amp; Edit
  </button>

  <div class="offline-notice" id="offlineNotice" style="display:none">
    Open ScreenStudio app first
  </div>

  <script src="popup.js"></script>
</body>
</html>
